# Starship Configuration - Rocinante Bridge Theme (The Expanse)
# MCRN Tactical OS Prompt (Warp-like)

# ============================================================================
# GENERAL SETTINGS
# ============================================================================
add_newline = true
command_timeout = 500
scan_timeout = 10
palette = "mcrn"

[palettes.mcrn]
carbon = "#1a0b0c"
hull_breach = "#ff2929"
drive_plume = "#b04c2a"
warning = "#ffd34e"
holomap = "#c47a40"
sensor_ghost = "#994444"
ice = "#ffd34e"
starlight = "#eaeaea"

# ============================================================================
# FORMAT - Tactical Readout Style (Two-Line)
# ============================================================================
format = """
$directory$git_branch$git_status$cmd_duration$python$nodejs$rust$golang$ruby$java$kotlin$haskell$php$lua$terraform$docker_context
$character"""

right_format = ""

# ============================================================================
# MODULES - MCRN Color Scheme
# ============================================================================
[character]
success_symbol = "[‚Äļ](fg:warning)"
error_symbol = "[‚Äļ](fg:hull_breach)"
vimcmd_symbol = "[¬ę](fg:drive_plume)"

[directory]
style = "fg:warning"
format = "[$read_only]($read_only_style)[‚¨° $path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"
read_only = "ůįĆĺ "
read_only_style = "fg:carbon"
home_symbol = "~"
truncate_to_repo = true
before_repo_root_style = "fg:holomap"
repo_root_style = "fg:ice bold"
repo_root_format = "[‚¨° $before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path ]($style)"

[directory.substitutions]
"Development" = "Dev"
"Code" = "Code"
"Projects" = "Proj"

[git_branch]
symbol = "Óā† "
style = "fg:holomap"
format = "[$symbol$branch]($style) "
truncation_length = 20
truncation_symbol = "..."

[git_status]
style = "fg:sensor_ghost"
format = '([$all_status$ahead_behind]($style) )'
conflicted = " [!](fg:hull_breach)"
ahead = " [‚ÜĎ](fg:sensor_ghost)"
behind = " [‚Üď](fg:sensor_ghost)"
diverged = " [‚áē](fg:sensor_ghost)"
untracked = " [‚ÄĘ](fg:warning)"
stashed = " [*](fg:holomap)"
modified = " [őĒ](fg:hull_breach)"
staged = " [+](fg:drive_plume)"
renamed = " [¬Ľ](fg:sensor_ghost)"
deleted = " [‚úė](fg:hull_breach)"
up_to_date = ""

[cmd_duration]
min_time = 1000
format = "[T+ $duration ](fg:ice)"
show_milliseconds = false
show_notifications = false

# ============================================================================
# LANGUAGE MODULES - Subsystems
# ============================================================================
[python]
symbol = "ůįĆ† "
style = "fg:sensor_ghost"
format = "[$symbol]($style)"
pyenv_version_name = true
pyenv_prefix = ""
detect_files = ["*.py", "pyproject.toml", "requirements.txt", "Pipfile", "setup.py"]

[nodejs]
symbol = "ůįéô "
style = "fg:drive_plume"
format = "[$symbol]($style)"
detect_files = ["package.json", ".node-version", ".nvmrc"]

[rust]
symbol = "ůĪėó "
style = "fg:hull_breach"
format = "[$symbol]($style)"

[golang]
symbol = "ůįüď "
style = "fg:ice"
format = "[$symbol]($style)"

[ruby]
symbol = "ÓěĎ "
style = "fg:sensor_ghost"
format = "[$symbol]($style)"

[java]
symbol = "ÓČĖ "
style = "fg:warning"
format = "[$symbol]($style)"

[kotlin]
symbol = "ůįĆč "
style = "fg:holomap"
format = "[$symbol]($style)"

[haskell]
symbol = "őĽ "
style = "fg:holomap"
format = "[$symbol]($style)"

[php]
symbol = "ůįĆü "
style = "fg:warning"
format = "[$symbol]($style)"

[lua]
symbol = "ůįĘĪ "
style = "fg:drive_plume"
format = "[$symbol]($style)"

# ============================================================================
# DISABLED MODULES
# ============================================================================
[username]
disabled = true

[hostname]
disabled = true

[container]
disabled = true

[shell]
disabled = true

[shlvl]
disabled = true

[sudo]
disabled = true

[jobs]
disabled = true

[package]
disabled = true

[aws]
disabled = true

[gcloud]
disabled = true

[azure]
disabled = true

[kubernetes]
disabled = true

[terraform]
symbol = "ůĪĀĘ "
style = "fg:holomap"
format = "[$symbol]($style)"

[docker_context]
symbol = "ůį°® "
style = "fg:drive_plume"
format = "[$symbol]($style)"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile", "compose.yml", "compose.yaml"]
