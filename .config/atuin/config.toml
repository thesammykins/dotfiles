# Atuin - Shell History TUI
# MCRN Tactical configuration

## Search
search_mode = "fuzzy"
filter_mode = "global"
filter_mode_shell_up_key_binding = "session"

## UI
style = "compact"
inline_height = 20
show_preview = true
show_help = false
show_tabs = false

## Behavior
# Put command in buffer for review before execution (matches MCRN review-before-fire pattern)
enter_accept = false

## History
history_filter = [
    "^export ",
    "^set ",
]

## Sync (opt-in per machine via ~/.zshrc.local or atuin login)
# auto_sync = true
# sync_frequency = "5m"
# sync_address = "https://api.atuin.sh"
