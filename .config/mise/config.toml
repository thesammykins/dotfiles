# ~/.config/mise/config.toml
# Global toolchain manager configuration for MCRN Tactical Setup

[tools]
# Core language runtimes: owned by mise globally, not Homebrew.
node = "24.14.0"
python = "3.13.12"
go = "1.26.1"
java = "21"
rust = "1.94.1"

# Developer toolchains and fast-moving CLIs that benefit from pinned global versions.
dotnet = "10.0.201"
terraform = "1.14.7"
flyctl = "0.4.26"
gradle = "9.4.1"
uv = "0.11.7"
opencode = "1.14.25"
pnpm = "10.33.2"

[settings]
experimental = true
jobs = 4
